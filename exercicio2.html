<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lista de Convidados - Festa</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:800px;margin:2rem auto;padding:1rem}
    label{display:block;margin:0.4rem 0}
    input, select, button{font-size:1rem;padding:0.4rem}
    table{width:100%;border-collapse:collapse;margin-top:1rem}
    th,td{border:1px solid #ccc;padding:0.5rem;text-align:left}
    th{background:#f0f0f0}
  </style>
</head>
<body>
  <h1>Cadastro de Convidados</h1>

  <form id="convidadoForm">
    <label>Nome:
      <input type="text" id="nome" required>
    </label>

    <label>Sexo:
      <select id="sexo" required>
        <option value="">-- selecione --</option>
        <option value="Masculino">Masculino</option>
        <option value="Feminino">Feminino</option>
        <option value="Outro">Outro</option>
      </select>
    </label>

    <label>E-mail:
      <input type="email" id="email" required>
    </label>

    <button type="submit">Adicionar convidado</button>
  </form>

  <h2>Convidados registrados</h2>
  <table aria-label="Tabela de convidados">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Sexo</th>
        <th>E-mail</th>
      </tr>
    </thead>
    <tbody id="corpoTabela">
    </tbody>
  </table>

  <script>
    const form = document.getElementById('convidadoForm');
    const corpoTabela = document.getElementById('corpoTabela');

    // Usaremos um Set de strings (JSON) para evitar duplicatas por conteúdo
    const convidados = new Set();

    form.addEventListener('submit', function(e){
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const sexo = document.getElementById('sexo').value;
      const email = document.getElementById('email').value.trim().toLowerCase();

      if(!nome || !sexo || !email){
        alert('Preencha todos os campos.');
        return;
      }

      const convidado = { nome: nome, sexo: sexo, email: email };
      const chave = JSON.stringify(convidado);

      convidados.add(chave);
      atualizarTabela();

      form.reset();
      document.getElementById('nome').focus();
    });

    function atualizarTabela(){
      corpoTabela.innerHTML = '';

      convidados.forEach(function(item){
        const obj = JSON.parse(item);
        const tr = document.createElement('tr');
        const tdNome = document.createElement('td');
        const tdSexo = document.createElement('td');
        const tdEmail = document.createElement('td');

        tdNome.textContent = obj.nome;
        tdSexo.textContent = obj.sexo;
        tdEmail.textContent = obj.email;

        tr.appendChild(tdNome);
        tr.appendChild(tdSexo);
        tr.appendChild(tdEmail);

        corpoTabela.appendChild(tr);
      });
    }
  </script>
</body>
</html>
